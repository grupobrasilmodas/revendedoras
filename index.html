<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRA. 18K — Comunidade da Revendedora</title>
<style>
  :root{
    --black:#1A1A1A; --pearl:#F5F3EE; --pearl2:#FBFAF7;
    --gold:#B8963E; --gold-bright:#E7C878; --line:#E4DFD2;
    --text:#1A1A1A; --dim:#8A8A8A; --dim2:#A8A296;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--pearl); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; }
  .serif{ font-family:Georgia,'Times New Roman',serif; }
  input, textarea, select, button{ font-family:inherit; }
  button{ cursor:pointer; }
  ::placeholder{ color:var(--dim2); }

  .header{ background:var(--black); padding:22px 20px; }
  .header-inner{ max-width:760px; margin:0 auto; display:flex; align-items:center; gap:14px; }
  .header-inner img{ width:56px; height:56px; object-fit:cover; border-radius:10px; border:1px solid #3B3327; flex-shrink:0; }
  .brandname{ color:var(--gold-bright); font-size:22px; font-weight:700; letter-spacing:2px; }
  .brandsub{ color:#B9B2A3; font-size:12.5px; letter-spacing:1px; margin-top:2px; }

  .wrap{ max-width:760px; margin:0 auto; padding:20px 16px 90px; }

  .card{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:18px; }
  .card-title{ font-size:13px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .input{ border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:14px; outline:none; background:var(--pearl2); color:var(--text); width:100%; }
  .row-gap{ display:flex; gap:8px; }
  .btn{ border:none; border-radius:8px; padding:11px 14px; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn-primary{ background:var(--black); color:var(--gold-bright); }
  .btn-light{ background:#F0EDE4; color:var(--black); }
  .btn-green{ background:#25D366; color:#fff; }
  .btn-small{ font-size:12.5px; padding:8px 12px; border-radius:8px; border:1px solid var(--line); background:#fff; color:#6B6B6B; }

  .chip{ display:inline-flex; align-items:center; gap:5px; border-radius:20px; padding:6px 12px; font-size:12.5px; font-weight:500; border:1px solid var(--line); background:#fff; color:#6B6B6B; }
  .chip.active{ font-weight:700; }
  .chips-wrap{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .actions-wrap{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }

  .contact{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .contact-name{ font-size:15px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:280px; }
  .contact-meta{ font-size:12.5px; color:var(--dim); margin-top:2px; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .tier-badge{ border-radius:20px; padding:1px 8px; font-size:11px; font-weight:700; margin-left:4px; }
  .icon-btn{ background:var(--pearl); border:1px solid var(--line); border-radius:8px; padding:8px; color:#6B6B6B; display:flex; align-items:center; justify-content:center; }
  .icon-btn.danger{ color:#B84E4E; }

  .empty-state{ text-align:center; color:var(--dim2); padding:40px 0; font-size:14px; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
  .modal{ background:#fff; border-radius:12px; padding:20px; width:100%; max-width:440px; max-height:88vh; overflow-y:auto; }
  .modal-close{ background:none; border:none; color:var(--dim2); }

  .attach-box{ display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:8px; padding:10px; background:var(--pearl2); }
  .attach-thumb{ width:44px; height:44px; object-fit:cover; border-radius:6px; flex-shrink:0; }
  .attach-icon{ width:44px; height:44px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .attach-drop{ display:flex; align-items:center; justify-content:center; gap:8px; border:1.5px dashed #D9D3C4; border-radius:8px; padding:16px 10px; color:var(--dim2); font-size:12.5px; cursor:pointer; }

  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--black); color:var(--pearl); padding:10px 18px; border-radius:30px; font-size:13px; z-index:60; }

  .progress-track{ height:4px; background:#F0EDE4; border-radius:4px; margin-bottom:16px; overflow:hidden; }
  .progress-fill{ height:100%; background:var(--gold); }

  .bottom-note{ display:flex; gap:5px; align-items:flex-start; margin-top:8px; color:var(--dim2); font-size:10.5px; line-height:1.4; }

  .topbar-tools{ display:flex; justify-content:flex-end; gap:8px; margin-bottom:14px; }
  .topbar-tools button{ font-size:11.5px; }
</style>

<!-- Banco de dados em nuvem (Supabase) — sincroniza os contatos entre todos os computadores -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="setupScreen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:var(--pearl);">
  <div style="text-align:center; padding:40px; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.05); max-width:400px; width:100%;">
    <h2 class="serif" style="margin-bottom:10px; color:var(--black);">DRA. 18K</h2>
    <p id="setupText" style="font-size:14px; color:var(--dim); margin-bottom:24px;">Conectando ao banco de dados em nuvem (Supabase)...</p>
    <div id="setupError" style="display:none; text-align:left; font-size:12.5px; color:#B84E4E; background:#FBEDED; border:1px solid #F0D3D3; border-radius:8px; padding:12px; margin-bottom:16px;"></div>
    <button id="setupRetryBtn" class="btn btn-primary" style="width:100%; padding:12px; display:none;" onclick="initSupabase()">
      🔄 Tentar novamente
    </button>
  </div>
</div>

<div id="appRoot" style="display:none;">
  <div class="header">
    <div class="header-inner">
      <img id="logoImg" alt="DRA. 18K" />
      <div>
        <div class="brandname">DRA. 18K</div>
        <div class="brandsub">COMUNIDADE DA REVENDEDORA · CONTATOS &amp; MENSAGENS</div>
      </div>
      <div id="syncBadge" style="margin-left:auto; font-size:11px; color:#8CA36A; display:flex; align-items:center; gap:5px; white-space:nowrap;">
        ● Sincronizado em nuvem
      </div>
    </div>
  </div>

  <div class="wrap">

    <div class="topbar-tools">
      <button class="btn btn-small" onclick="exportData()">⭳ Exportar dados</button>
      <label class="btn btn-small" style="margin:0;">
        ⭱ Importar dados
        <input type="file" accept="application/json" style="display:none" onchange="importData(this.files[0])">
      </label>
    </div>

    <!-- Add / edit form -->
    <div class="card">
      <div class="card-title" id="formTitle">Adicionar revendedora</div>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <input id="inputNome" class="input" placeholder="Nome da revendedora">
        <div class="row-gap">
          <input id="inputTelefone" class="input" placeholder="Telefone com DDD (ex: 11 91234-5678)" style="flex:1">
          <select id="inputTier" class="input" style="width:150px"></select>
        </div>
        <div class="row-gap">
          <button class="btn btn-primary" style="flex:1" id="submitBtn" onclick="addOrUpdateContact()">Adicionar</button>
          <button class="btn btn-light" id="cancelEditBtn" style="display:none" onclick="cancelEdit()">✕</button>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div style="position:relative; margin-bottom:14px;">
      <input id="inputSearch" class="input" style="padding-left:36px" placeholder="Buscar por nome ou telefone" oninput="onSearchInput(this.value)">
    </div>

    <div id="chipsArea" class="chips-wrap"></div>
    <div id="actionsArea" class="actions-wrap"></div>
    <div id="listArea"></div>

  </div>

  <div id="modalArea"></div>
  <div id="toastArea"></div>
</div>

/* ======================= HELPERS ======================= */
function onlyDigits(s){ return (s||"").replace(/\D/g,""); }
function toWaNumber(raw){ let d = onlyDigits(raw); if (d.length <= 11) d = "55"+d; return d; }
function formatPhoneDisplay(raw){
  const d = onlyDigits(raw);
  if (d.length === 11) return "("+d.slice(0,2)+") "+d.slice(2,7)+"-"+d.slice(7);
  if (d.length === 10) return "("+d.slice(0,2)+") "+d.slice(2,6)+"-"+d.slice(6);
  return raw;
}
function fileKind(file){
  if (!file) return "file";
  if (file.type && file.type.startsWith("image/")) return "image";
  if (file.type && file.type.startsWith("video/")) return "video";
  return "file";
}
function formatBytes(b){
  if (b < 1024) return b+" B";
  if (b < 1024*1024) return (b/1024).toFixed(0)+" KB";
  return (b/(1024*1024)).toFixed(1)+" MB";
}
function tierOf(key){ return key === "general" ? GENERAL_PSEUDO : (TIERS.find(t => t.key === key) || TIERS[0]); }
function resolveMessage(c, mode){
  const tpl = (mode === "general" ? S.templates.general : S.templates[c.tier]) || "";
  return tpl.replace(/\{nome\}/g, c.nome.split(" ")[0]);
}
function waUrl(c, mode){ return "https://wa.me/"+toWaNumber(c.telefone)+"?text="+encodeURIComponent(resolveMessage(c, mode)); }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(",")[1] || "");
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function showToast(msg){
  document.getElementById("toastArea").innerHTML = '<div class="toast">'+esc(msg)+'</div>';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ document.getElementById("toastArea").innerHTML = ""; }, 2200);
}

/* ======================= PERSISTENCE (Supabase + Realtime) ======================= */
async function initSupabase(){
  const setupText = document.getElementById("setupText");
  const setupError = document.getElementById("setupError");
  const setupRetryBtn = document.getElementById("setupRetryBtn");
  setupError.style.display = "none";
  setupRetryBtn.style.display = "none";
  setupText.textContent = "Conectando ao banco de dados em nuvem (Supabase)...";

  if (!SUPABASE_READY){
    setupText.textContent = "Configuração necessária";
    setupError.style.display = "block";
    setupError.innerHTML = "Preencha <b>supabaseConfig.url</b> e <b>supabaseConfig.anonKey</b> no código (dentro de &lt;script&gt;) com os dados do seu projeto Supabase (Project Settings &rarr; API), e crie as tabelas <b>contacts</b> e <b>templates</b> indicadas no comentário do código.";
    return;
  }

  try{
    db = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);

    // Carrega os contatos existentes
    const { data: contactsData, error: contactsErr } = await db
      .from("contacts")
      .select("*")
      .order("created_at", { ascending: true });
    if (contactsErr) throw contactsErr;
    S.contacts = contactsData || [];

    // Carrega os modelos de mensagem; cria os padrões se a tabela estiver vazia
    const { data: templatesData, error: templatesErr } = await db.from("templates").select("*");
    if (templatesErr) throw templatesErr;
    if (!templatesData || templatesData.length === 0){
      const rows = Object.keys(DEFAULT_TEMPLATES).map(key => ({ tier_key: key, message: DEFAULT_TEMPLATES[key] }));
      await db.from("templates").insert(rows);
      S.templates = JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
      S.waTemplates = {};
    } else {
      S.templates = Object.assign({}, DEFAULT_TEMPLATES);
      S.waTemplates = {};
      templatesData.forEach(row => {
        S.templates[row.tier_key] = row.message;
        if (row.whatsapp_template_name) S.waTemplates[row.tier_key] = row.whatsapp_template_name;
      });
    }

    // Contatos em tempo real — qualquer computador que adicionar/editar/excluir
    // atualiza todos os outros na hora.
    contactsChannel = db.channel("contacts-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "contacts" }, async () => {
        const { data, error } = await db.from("contacts").select("*").order("created_at", { ascending: true });
        if (!error){ S.contacts = data || []; renderChips(); renderList(); }
      })
      .subscribe();

    // Modelos de mensagem em tempo real
    templatesChannel = db.channel("templates-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "templates" }, async () => {
        const { data, error } = await db.from("templates").select("*");
        if (!error){
          const merged = Object.assign({}, DEFAULT_TEMPLATES);
          const waMerged = {};
          (data || []).forEach(row => {
            merged[row.tier_key] = row.message;
            if (row.whatsapp_template_name) waMerged[row.tier_key] = row.whatsapp_template_name;
          });
          S.templates = merged;
          S.waTemplates = waMerged;
          renderChips(); renderList();
        }
      })
      .subscribe();

    document.getElementById("setupScreen").style.display = "none";
    document.getElementById("appRoot").style.display = "block";
    populateTierSelect();
    renderChips(); renderList();
  } catch (err){
    console.error("Erro ao conectar ao Supabase:", err);
    setupText.textContent = "Não foi possível conectar ao Supabase";
    setupError.style.display = "block";
    setupError.textContent = (err && err.message) ? err.message : "Verifique a URL, a chave anon e se as tabelas 'contacts' e 'templates' existem.";
    setupRetryBtn.style.display = "block";
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify({ contacts: S.contacts, templates: S.templates }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "backup_comunidade_dra18k.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Backup exportado");
}
function importData(file){
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const parsed = JSON.parse(reader.result);
      const contacts = parsed.contacts || [];
      const templates = Object.assign({}, DEFAULT_TEMPLATES, parsed.templates || {});
      showToast("Importando "+contacts.length+" contatos...");

      if (contacts.length > 0){
        const rows = contacts.map(c => ({ nome: c.nome, telefone: c.telefone, tier: c.tier }));
        const { error: contactsErr } = await db.from("contacts").insert(rows);
        if (contactsErr) throw contactsErr;
      }

      const templateRows = Object.keys(templates).map(key => ({ tier_key: key, message: templates[key] }));
      const { error: templatesErr } = await db.from("templates").upsert(templateRows, { onConflict: "tier_key" });
      if (templatesErr) throw templatesErr;

      showToast("Dados importados com sucesso");
    }catch(e){ console.error(e); showToast("Arquivo inválido ou erro ao importar"); }
  };
  reader.readAsText(file);
}

/* ======================= CONTACT CRUD ======================= */
function addOrUpdateContact(){
  const nome = document.getElementById("inputNome").value.trim();
  const telefone = document.getElementById("inputTelefone").value.trim();
  const tier = document.getElementById("inputTier").value;
  if (!nome || onlyDigits(telefone).length < 10){
    showToast("Preencha nome e um telefone válido com DDD");
    return;
  }
  if (S.editingId){
    const editingId = S.editingId;
    db.from("contacts").update({ nome, telefone, tier }).eq("id", editingId).select().single()
      .then(({ data, error }) => {
        if (error){ console.error(error); showToast("Erro ao salvar — verifique sua internet"); return; }
        const idx = S.contacts.findIndex(c => c.id === editingId);
        if (idx !== -1 && data) S.contacts[idx] = data;
        renderChips(); renderList();
      });
    S.editingId = null;
    document.getElementById("formTitle").innerHTML = icon("plus",15,"#B8963E") + " Adicionar revendedora";
    document.getElementById("submitBtn").textContent = "Adicionar";
    document.getElementById("cancelEditBtn").style.display = "none";
  } else {
    db.from("contacts").insert({ nome, telefone, tier }).select().single()
      .then(({ data, error }) => {
        if (error){ console.error(error); showToast("Erro ao salvar — verifique sua internet"); return; }
        if (data && !S.contacts.some(c => c.id === data.id)){
          S.contacts.push(data);
          renderChips(); renderList();
        }
      });
  }
  document.getElementById("inputNome").value = "";
  document.getElementById("inputTelefone").value = "";
}
function startEdit(id){
  const c = S.contacts.find(x => x.id === id);
  if (!c) return;
  S.editingId = id;
  document.getElementById("inputNome").value = c.nome;
  document.getElementById("inputTelefone").value = c.telefone;
  document.getElementById("inputTier").value = c.tier;
  document.getElementById("formTitle").innerHTML = icon("pencil",15,"#B8963E") + " Editar revendedora";
  document.getElementById("submitBtn").textContent = "Salvar alterações";
  document.getElementById("cancelEditBtn").style.display = "flex";
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function cancelEdit(){
  S.editingId = null;
  document.getElementById("inputNome").value = "";
  document.getElementById("inputTelefone").value = "";
  document.getElementById("formTitle").innerHTML = icon("plus",15,"#B8963E") + " Adicionar revendedora";
  document.getElementById("submitBtn").textContent = "Adicionar";
  document.getElementById("cancelEditBtn").style.display = "none";
}
function deleteContact(id){
  if (S.editingId === id) cancelEdit();
  db.from("contacts").delete().eq("id", id)
    .then(({ error }) => {
      if (error){ console.error(error); showToast("Erro ao excluir — verifique sua internet"); return; }
      S.contacts = S.contacts.filter(c => c.id !== id);
      renderChips(); renderList();
    });
}

/* ======================= BULK SEND ======================= */
function startBulk(tierKey, mode){
  const list = mode === "general" ? S.contacts.slice() : S.contacts.filter(c => c.tier === tierKey);
  if (list.length === 0){ showToast("Nenhuma revendedora nesse filtro"); return; }
  S.bulk = { queue: list, index: 0, mode, label: mode === "general" ? "📢 Mensagem Geral" : (tierOf(tierKey).emoji+" "+tierOf(tierKey).label) };
  S.bulkSentIds = [];
  renderModals();
}
function bulkOpenCurrent(){
  if (!S.bulk) return;
  const c = S.bulk.queue[S.bulk.index];
  window.open(waUrl(c, S.bulk.mode), "_blank");
  S.bulkSentIds.push(c.id);
  bulkAdvance();
}
function bulkAdvance(){
  if (!S.bulk) return;
  const next = S.bulk.index + 1;
  S.bulk.index = Math.min(next, S.bulk.queue.length);
  renderModals();
}
function closeBulk(){ S.bulk = null; S.bulkSentIds = []; renderModals(); }

/* ======================= ENVIO AUTOMÁTICO (API oficial do WhatsApp) ======================= */
const AUTO_SEND_DELAY_MS = 1200; // intervalo entre mensagens, pra não estourar limites da API

function startAutoBulk(tierKey, mode){
  const list = mode === "general" ? S.contacts.slice() : S.contacts.filter(c => c.tier === tierKey);
  if (list.length === 0){ showToast("Nenhuma revendedora nesse filtro"); return; }

  S.autoBulk = {
    queue: list,
    index: 0,
    mode,
    tierKey,
    label: mode === "general" ? "📢 Mensagem Geral" : (tierOf(tierKey).emoji+" "+tierOf(tierKey).label),
    successIds: [],
    failedIds: [],
    running: true,
    stopped: false,
  };
  renderModals();
  runAutoBulkStep();
}

async function runAutoBulkStep(){
  const ab = S.autoBulk;
  if (!ab || ab.stopped) return;

  if (ab.index >= ab.queue.length){
    ab.running = false;
    renderModals();
    return;
  }

  const c = ab.queue[ab.index];
  const message = resolveMessage(c, ab.mode);
  const attKey = ab.mode === "general" ? "general" : c.tier;
  const att = S.attachments[attKey];

  try{
    let media = null;
    if (att && att.file){
      const base64 = await fileToBase64(att.file);
      media = { base64, filename: att.name, mimetype: att.type };
    }
    const { data, error } = await db.functions.invoke("send-crm-message", {
      body: { to: toWaNumber(c.telefone), message, media, channel: S.crmChannel }
    });
    if (error || !data || data.ok === false){
      console.error("Falha ao enviar para", c.nome, error || data);
      ab.failedIds.push(c.id);
    } else {
      ab.successIds.push(c.id);
    }
  }catch(err){
    console.error("Falha ao enviar para", c.nome, err);
    ab.failedIds.push(c.id);
  }

  ab.index += 1;
  renderModals();

  if (ab.stopped) return;
  setTimeout(runAutoBulkStep, AUTO_SEND_DELAY_MS);
}

function stopAutoBulk(){
  if (!S.autoBulk) return;
  S.autoBulk.stopped = true;
  S.autoBulk.running = false;
  renderModals();
}

function closeAutoBulk(){ S.autoBulk = null; renderModals(); }

async function testWhatsAppAPI(){
  const numero = window.prompt("Digite o número (com DDI+DDD, só números) para receber a mensagem de teste:\nEx: 5511999998888");
  if (!numero) return;
  const to = numero.replace(/\D/g, "");
  if (to.length < 10){ showToast("Número inválido"); return; }

  showToast("Enviando mensagem de teste...");
  try{
    const { data, error } = await db.functions.invoke("send-crm-message", {
      body: { to, message: "Teste de envio automático — Comunidade DRA. 18K ✅", channel: S.crmChannel }
    });
    if (error || !data || data.ok === false){
      console.error("Falha no teste:", error || data);
      showToast("Falha no teste — veja o console (F12) para detalhes");
    } else {
      showToast("Mensagem de teste enviada! Confira o WhatsApp do número informado.");
    }
  }catch(err){
    console.error("Falha no teste:", err);
    showToast("Erro ao chamar a função — veja o console (F12)");
  }
}

/* ======================= ATTACHMENTS (session-only) ======================= */
function onAttachmentPicked(key, inputEl){
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
  if (file.size > MAX_ATTACHMENT_MB*1024*1024){ showToast("Arquivo muito grande (máx. "+MAX_ATTACHMENT_MB+"MB)"); return; }
  if (S.attachments[key] && S.attachments[key].url) URL.revokeObjectURL(S.attachments[key].url);
  const url = URL.createObjectURL(file);
  S.attachments[key] = { name: file.name, size: file.size, type: file.type, url, file };
  renderModals(); renderChips(); renderList();
}
function removeAttachment(key){
  if (S.attachments[key] && S.attachments[key].url) URL.revokeObjectURL(S.attachments[key].url);
  delete S.attachments[key];
  renderModals(); renderChips(); renderList();
}
function downloadAttachment(key){
  const att = S.attachments[key];
  if (!att) return;
  const a = document.createElement("a");
  a.href = att.url; a.download = att.name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function attachmentPreviewHTML(att, key, compact){
  if (!att) return "";
  const kind = fileKind(att);
  const size = compact ? 34 : 44;
  let thumb;
  if (kind === "image") thumb = '<img class="attach-thumb" style="width:'+size+'px;height:'+size+'px" src="'+att.url+'">';
  else if (kind === "video") thumb = '<div class="attach-icon" style="width:'+size+'px;height:'+size+'px;background:#1A1A1A">'+icon("video",18,"#E7C878")+'</div>';
  else thumb = '<div class="attach-icon" style="width:'+size+'px;height:'+size+'px;background:#F0EDE4">'+icon("fileText",18,"#8A8A8A")+'</div>';
  return '<div class="attach-box">'+thumb+
    '<div style="min-width:0;flex:1"><div style="font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(att.name)+'</div>'+
    '<div style="font-size:11px;color:var(--dim2)">'+formatBytes(att.size)+'</div></div>'+
    '<button class="icon-btn" title="Baixar anexo" onclick="downloadAttachment(\''+key+'\')">'+icon("download",14)+'</button>'+
    (key ? '<button class="icon-btn danger" title="Remover anexo" onclick="removeAttachment(\''+key+'\')">'+icon("x",14)+'</button>' : '')+
    '</div>';
}

/* ======================= FILTER ======================= */
function setActiveTier(key){ S.activeTier = key; renderChips(); renderList(); }
function onSearchInput(val){ S.search = val; renderList(); }
function filteredContacts(){
  return S.contacts
    .filter(c => S.activeTier === "todos" ? true : c.tier === S.activeTier)
    .filter(c => S.search.trim() === "" ? true : (c.nome.toLowerCase().includes(S.search.toLowerCase()) || onlyDigits(c.telefone).includes(onlyDigits(S.search))));
}
function counts(){
  const m = {}; TIERS.forEach(t => m[t.key] = 0);
  S.contacts.forEach(c => m[c.tier] = (m[c.tier]||0) + 1);
  return m;
}

      '</div>'+
      '<div style="font-size:11.5px;color:var(--dim2);margin-bottom:10px">Use {nome} para inserir o primeiro nome da revendedora automaticamente.</div>'+
      '<textarea id="templateTextarea" class="input" rows="6" style="resize:vertical">'+esc(S.draftTemplate)+'</textarea>'+
      '<div style="margin-top:14px">'+
        '<div style="font-size:12px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px">'+icon("paperclip",13,"#B8963E")+' Anexo (foto, vídeo ou arquivo)</div>'+
        (att ? attachmentPreviewHTML(att, S.editTemplateTier, false) :
          '<label class="attach-drop">'+icon("plus",15)+' Escolher foto, vídeo ou arquivo'+
            '<input type="file" accept="image/*,video/*,.pdf,.doc,.docx" style="display:none" onchange="onAttachmentPicked(\''+S.editTemplateTier+'\', this)"></label>')+
        '<div class="bottom-note">'+icon("alert",13)+' O WhatsApp não permite anexar arquivo automaticamente por link. Ao enviar, baixe o anexo (fica salvo aqui) e arraste para dentro da conversa que abrir.</div>'+
      '</div>'+
      '<div class="row-gap" style="margin-top:12px">'+
        '<button class="btn btn-primary" style="flex:1" onclick="saveTemplate()">Salvar</button>'+
        '<button class="btn btn-light" onclick="closeTemplateEditor()">Cancelar</button>'+
      '</div>'+
    '</div></div>';
  }

  // Bulk send modal
  if (S.bulk){
    const finished = S.bulk.index >= S.bulk.queue.length;
    html += '<div class="modal-overlay"><div class="modal">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'+
        '<div style="font-size:14px;font-weight:700">Envio em massa — '+S.bulk.label+'</div>'+
        '<button class="modal-close" onclick="closeBulk()">'+icon("x",18)+'</button>'+
      '</div>';
    if (!finished){
      const c = S.bulk.queue[S.bulk.index];
      const t = tierOf(c.tier);
      const attKey = S.bulk.mode === "general" ? "general" : c.tier;
      const att = S.attachments[attKey];
      html += '<div style="font-size:11.5px;color:var(--dim2);margin-bottom:10px">'+(S.bulk.index+1)+' de '+S.bulk.queue.length+' · '+S.bulkSentIds.length+' já enviadas</div>'+
        '<div class="progress-track"><div class="progress-fill" style="width:'+((S.bulk.index/S.bulk.queue.length)*100)+'%"></div></div>'+
        '<div style="border:1px solid var(--line);border-left:4px solid '+t.color+';border-radius:8px;padding:12px;margin-bottom:12px">'+
          '<div style="font-size:15px;font-weight:700">'+esc(c.nome)+'</div>'+
          '<div class="contact-meta">'+icon("phone",11)+' '+formatPhoneDisplay(c.telefone)+
            '<span class="tier-badge" style="background:'+t.light+';color:'+t.color+'">'+t.emoji+' '+t.label+'</span></div>'+
          '<div style="margin-top:10px;background:var(--pearl2);border:1px solid #F0EDE4;border-radius:6px;padding:10px;font-size:12.5px;color:#4A4A4A;max-height:100px;overflow-y:auto">'+esc(resolveMessage(c, S.bulk.mode))+'</div>'+
          (att ? '<div style="margin-top:8px">'+attachmentPreviewHTML(att, null, true)+'</div>' : '')+
        '</div>'+
        '<div class="row-gap">'+
          '<button class="btn btn-green" style="flex:1" onclick="bulkOpenCurrent()">'+icon("arrowRight",16)+' Abrir WhatsApp e ir pra próxima</button>'+
          '<button class="icon-btn" title="Pular sem enviar" onclick="bulkAdvance()">'+icon("skip",16)+'</button>'+
        '</div>'+
        '<div class="bottom-note">Cada clique abre o WhatsApp já com a mensagem pronta. Se houver anexo, baixe-o (📎 acima) e arraste para dentro da conversa antes de enviar.</div>';
    } else {
      html += '<div style="text-align:center;padding:20px 0">'+
        '<div style="font-size:30px;margin-bottom:8px">✅</div>'+
        '<div style="font-size:15px;font-weight:700">Fila concluída</div>'+
        '<div style="font-size:13px;color:var(--dim);margin-top:4px">'+S.bulkSentIds.length+' de '+S.bulk.queue.length+' mensagens abertas no WhatsApp</div>'+
        '<button class="btn btn-primary" style="margin-top:16px;display:inline-flex" onclick="closeBulk()">Fechar</button>'+
      '</div>';
    }
    html += '</div></div>';
  }

  // Auto bulk send modal (API oficial)
  if (S.autoBulk){
    const ab = S.autoBulk;
    const finished = ab.index >= ab.queue.length;
    const current = !finished ? ab.queue[ab.index] : null;
    const currentTier = current ? tierOf(current.tier) : null;
    html += '<div class="modal-overlay"><div class="modal">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'+
        '<div style="font-size:14px;font-weight:700">Envio automático — '+ab.label+' <span style="font-weight:400;color:var(--dim2);font-size:12px">('+(S.crmChannel==="anuncio"?"📣 Anúncio":"⚖️ Jurídico")+')</span></div>'+
        '<button class="modal-close" onclick="'+(finished?"closeAutoBulk()":"stopAutoBulk()")+'">'+icon("x",18)+'</button>'+
      '</div>'+
      '<div style="font-size:11.5px;color:var(--dim2);margin-bottom:10px">'+ab.index+' de '+ab.queue.length+' · '+
        '<span style="color:#1F7A4D">'+ab.successIds.length+' enviadas</span>'+
        (ab.failedIds.length ? ' · <span style="color:#B84E4E">'+ab.failedIds.length+' falharam</span>' : '')+
      '</div>'+
      '<div class="progress-track"><div class="progress-fill" style="width:'+((ab.index/ab.queue.length)*100)+'%;background:#1F7A4D"></div></div>';

    if (!finished){
      html += '<div style="border:1px solid var(--line);border-left:4px solid '+currentTier.color+';border-radius:8px;padding:12px;margin-bottom:12px">'+
        '<div style="font-size:11px;color:var(--dim2);margin-bottom:4px">Enviando agora para:</div>'+
        '<div style="font-size:15px;font-weight:700">'+esc(current.nome)+'</div>'+
        '<div class="contact-meta">'+icon("phone",11)+' '+formatPhoneDisplay(current.telefone)+
          '<span class="tier-badge" style="background:'+currentTier.light+';color:'+currentTier.color+'">'+currentTier.emoji+' '+currentTier.label+'</span></div>'+
      '</div>'+
      '<div class="row-gap">'+
        '<button class="btn btn-light" style="flex:1" onclick="stopAutoBulk()">'+icon("x",15)+' Parar envio</button>'+
      '</div>'+
      '<div class="bottom-note">'+icon("alert",13)+' O envio continua sozinho, uma mensagem a cada '+(AUTO_SEND_DELAY_MS/1000)+'s, usando a mensagem cadastrada para cada nível. Você pode fechar esta janela e voltar depois — mas não feche a página do navegador.</div>';
    } else {
      html += '<div style="text-align:center;padding:12px 0">'+
        '<div style="font-size:30px;margin-bottom:8px">'+(ab.stopped ? "⏸️" : "✅")+'</div>'+
        '<div style="font-size:15px;font-weight:700">'+(ab.stopped ? "Envio interrompido" : "Envio concluído")+'</div>'+
        '<div style="font-size:13px;color:var(--dim);margin-top:4px">'+ab.successIds.length+' de '+ab.queue.length+' mensagens enviadas com sucesso'+(ab.failedIds.length?(' · '+ab.failedIds.length+' falharam'):'')+'</div>'+
        (ab.failedIds.length ? '<div style="font-size:11.5px;color:#B84E4E;margin-top:6px">Verifique o console do navegador para detalhes das falhas (número inválido, template não aprovado, etc).</div>' : '')+
        '<button class="btn btn-primary" style="margin-top:16px;display:inline-flex" onclick="closeAutoBulk()">Fechar</button>'+
      '</div>';
    }
    html += '</div></div>';
  }

  document.getElementById("modalArea").innerHTML = html;
}

/* ======================= INIT ======================= */
function populateTierSelect(){
  const sel = document.getElementById("inputTier");
  sel.innerHTML = TIERS.map(t => '<option value="'+t.key+'">'+t.emoji+' '+t.label+'</option>').join("");
}


window.addEventListener("DOMContentLoaded", initSupabase);
</script>
</body>
</html>
